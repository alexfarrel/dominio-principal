<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- O título é trocado pelo JS conforme o idioma detectado -->
  <title>Em Manutenção — Alexandre Oliveira</title>

  <!-- ============================================================
       GOOGLE FONTS
       Inter = textos | Space Grotesk = títulos
       (mesmas famílias do projeto principal)
  ============================================================ -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ============================================================
       BARRA DE IDIOMAS
       O JS marca o idioma ativo e atualiza os textos da página
  ============================================================ -->

  <!-- ============================================================
       CONTEÚDO PRINCIPAL
       Os textos com data-i18n="chave" são trocados pelo JS
  ============================================================ -->
  <main class="maintenance-container">

    <!-- Ícone de play animado — mesmo tema do portfólio de vídeos -->
    <div class="maintenance-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48"
      viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>

    <!-- Badge "Em manutenção" -->
    <div class="availability-badge">
      <span data-i18n="badge">Em manutenção</span>
    </div>

    <h1 class="maintenance-title" data-i18n="title">
      Estamos preparando algo novo.
    </h1>

    <p class="maintenance-desc" data-i18n="desc">
      O site está temporariamente indisponível enquanto realizamos
      melhorias e ajustes.
    </p>

    <!-- Botão "Ver vídeos"
         Troque o href pelo link do portfólio de vídeos -->
    <a href="https://videos.alexandreoliveira.sbs/" class="not-found-btn" id="back-btn">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="19" y1="12" x2="5" y2="12"/>
        <polyline points="12 19 5 12 12 5"/>
      </svg>
      <p data-i18n="btn">Ver vídeos</p>
</a>
  </main>

  <!-- ============================================================
       RODAPÉ — copyright com ano automático
  ============================================================ -->
  <footer class="site-footer">
    <p class="footer-copy">
      &copy; <span id="ano-atual"></span> Alexandre Oliveira ·
      <span data-i18n="rights">Todos os direitos reservados</span>
    </p>
  </footer>

  <script src="js/i18n.js"></script>
</body>
</html>
